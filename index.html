<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Alia 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#fff;font-family:Poppins,sans-serif}
.page{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:.8s}
#msg{opacity:0;pointer-events:none}
h1{font-family:"Great Vibes",cursive;color:#ef9fbd;font-size:58px;margin:0}
p{color:#d97fa4;font-size:22px;text-align:center;max-width:700px;line-height:1.8}
.card{background:#fff;border:2px solid #ffd6e6;border-radius:24px;padding:35px;box-shadow:0 10px 35px rgba(255,182,193,.25)}
input{padding:14px 18px;border-radius:12px;border:2px solid #f7bfd4;font-size:18px;text-align:center}
button{margin-top:16px;padding:12px 24px;border:none;border-radius:12px;background:#f6b9cf;color:#fff;font-size:18px;cursor:pointer}
#error{color:#e06a90;height:24px;margin-top:12px}
.heart{position:absolute;color:#f7bfd4;opacity:.35;animation:float 12s linear infinite;font-size:22px}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-20vh)}}
</style>
</head>
<body>
<div id="lock" class="page">
<div class="card">
<h1>Secret</h1>
<p>Enter the passcode</p>
<input id="code" type="password" placeholder="••••">
<br><button onclick="unlock()">Unlock</button>
<div id="error"></div>
</div>
</div>

<div id="msg" class="page">
<h1>To Alia,</h1>
<p>you are the most precious thing in the whole world,<br>Alhamdulilah for you always my jaan 🤍</p>
</div>

<script>
for(let i=0;i<8;i++){
 let h=document.createElement('div');
 h.className='heart';
 h.innerHTML='♡';
 h.style.left=(8+i*12)+'%';
 h.style.animationDuration=(10+Math.random()*8)+'s';
 h.style.animationDelay=(Math.random()*8)+'s';
 document.body.appendChild(h);
}
function unlock(){
 let v=document.getElementById('code').value.trim();
 if(v==="1729"){
   document.getElementById('lock').style.opacity=0;
   setTimeout(()=>{
     document.getElementById('lock').style.pointerEvents='none';
     let m=document.getElementById('msg');
     m.style.opacity=1;
     m.style.pointerEvents='auto';
   },700);
 }else{
   document.getElementById('error').textContent="Wrong Code";
 }
}
</script>
</body>
</html>
